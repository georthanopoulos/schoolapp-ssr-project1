spring.config.import=optional:file:.env[.properties]

## Database settings ##
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?sslMode=preferred&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}


## Logging settings ##
#logging.level.root=INFO  default
logging.level.gr.aueb.cf.schoolapp=DEBUG
logging.level.org.hibernate.SQL=DEBUG
spring.jpa.properties.hibernate.format_sql=true

# for production, you may want JSON format
#logging.structured.format.console=ecs or logstash or gelf   (for JSON output)

# rolling policy for log files (every 10MB max size it creates a new archive
# as a backup and continues with a new one (rolling policy). For 7 days retention is the default (rolling policy))
# Generally, the way of keeping archives with logs is diminishing.
logging.file.name=logs/schoolapp.log


# disable cache for local development(dev)
spring.thymeleaf.cache=false